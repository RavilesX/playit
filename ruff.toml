# Linter para PlayIt — solo errores reales y limpieza segura
line-length = 100
target-version = "py310"

[lint]
# E/W: estilo pycodestyle, F: pyflakes (imports/variables sin usar, etc.)
select = ["E", "W", "F"]
# E501: líneas largas existentes (HTML embebido, mensajes) — no bloquear
ignore = ["E501"]
